<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodOverkill — News Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#ffffff; --ink:#0a0a0a; --muted:#666; --faint:#aaa;
      --line:#e8e8e8; --rule:#000; --red:#d40000;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      background:var(--bg); color:var(--ink);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
    }

    .shell { width:min(1240px,calc(100% - 64px)); margin:0 auto; }

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:10; height:60px;
      display:flex; align-items:center; border-bottom:1px solid var(--ink);
      background:rgba(255,255,255,.96); backdrop-filter:blur(8px);
    }
    .header-inner {
      display:flex; align-items:center;
      width:100%; padding:0 32px;
    }
    .brand {
      font-family:'Inter',sans-serif;
      font-size:13px; font-weight:700; letter-spacing:.4em;
      color:var(--ink); text-decoration:none;
    }

    .nav-links {
      display:flex; align-items:center; gap:0; margin-left:36px;
    }
    .nav-link {
      font-family:'DM Mono',monospace;
      font-size:9px; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
      color:#999; text-decoration:none; padding:6px 14px;
      transition:color .2s;
    }
    .nav-link:hover { color:var(--ink); }
    .nav-link.active { color:var(--red); }

    .header-right {
      margin-left:auto; display:flex; align-items:center; gap:12px;
      font-family:'DM Mono',monospace;
      font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint);
    }
    .pulse-dot {
      width:6px; height:6px; border-radius:50%; background:var(--red);
      animation:blink 1.6s infinite;
    }
    .live-label { color:var(--red); font-size:8px; letter-spacing:.28em; font-weight:500; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── PAGE BODY ── */
    main.shell { padding:40px 0 64px; }

    /* ── MASTHEAD ── */
    .masthead-title {
      font-family:'Playfair Display',serif;
      font-weight:900; font-style:italic;
      font-size:52px; line-height:1.02; letter-spacing:-.01em;
      color:#000; text-align:left;
    }
    .masthead-rule {
      height:1px; background:var(--rule); margin:18px 0 0;
    }
    .masthead-row {
      display:flex; align-items:center; justify-content:space-between;
      gap:20px; padding:14px 0 0; margin-bottom:26px;
      border-bottom:1px solid var(--rule);
      flex-wrap:wrap;
    }

    /* ── SOURCE FILTER BAR ── */
    .filter-bar {
      display:flex; align-items:center; gap:24px;
      flex-wrap:wrap;
    }
    .filter-btn {
      font-family:'DM Mono',monospace;
      font-size:10px; font-weight:500; letter-spacing:.22em; text-transform:uppercase;
      padding:6px 0 12px; border:none; background:transparent;
      color:#888; cursor:pointer;
      border-bottom:2px solid transparent;
      transition:color .2s, border-color .2s;
    }
    .filter-btn:hover { color:var(--ink); }
    .filter-btn.active {
      color:var(--ink);
      border-bottom-color:var(--red);
    }
    .filter-btn.all.active { color:var(--ink); border-bottom-color:var(--red); }

    .masthead-date {
      font-family:'DM Mono',monospace;
      font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);
      padding-bottom:12px;
      white-space:nowrap;
    }

    /* ── GRID ── */
    .news-grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
    }

    /* ── TOP STORY (full width) ── */
    .news-card.top-story {
      grid-column:1 / -1;
      padding:8px 0 36px;
      border-bottom:1px solid var(--rule);
      display:block;
      animation:fadeIn .4s ease both;
    }
    .top-story .card-meta {
      display:flex; align-items:baseline; gap:16px; margin-bottom:14px;
    }
    .top-story .card-source {
      font-family:'DM Mono',monospace;
      font-size:8px; font-weight:500; letter-spacing:.3em; text-transform:uppercase;
      color:var(--red);
    }
    .top-story .card-date {
      font-family:'DM Mono',monospace;
      font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);
    }
    .top-story .card-headline {
      font-family:'Playfair Display',serif;
      font-size:48px; font-weight:700; line-height:1.06; letter-spacing:-.01em;
      color:#000; margin-bottom:20px; max-width:18ch;
    }
    .top-story .card-desc {
      font-family:'Inter',sans-serif;
      font-size:15px; line-height:1.65; color:#222;
      column-count:3; column-gap:36px;
      margin-bottom:18px;
    }
    .top-story .card-link {
      font-family:'DM Mono',monospace;
      font-size:11px; font-weight:500; letter-spacing:.16em; text-transform:uppercase;
      color:var(--red); text-decoration:none;
      display:inline-flex; align-items:center; gap:6px;
    }
    .top-story .card-link:hover { text-decoration:underline; }
    .top-story .card-link-arrow { transition:transform .2s; }
    .top-story .card-link:hover .card-link-arrow { transform:translateX(3px); }

    /* ── STANDARD CARD ── */
    .news-card {
      background:var(--bg);
      padding:26px 26px 26px 0;
      display:flex; flex-direction:column; gap:10px;
      position:relative;
      border-bottom:1px solid var(--line);
      animation:fadeIn .4s ease both;
    }
    /* column dividers */
    .news-grid .news-card:not(.top-story) {
      border-right:1px solid var(--line);
      padding-left:26px;
    }
    .news-grid .news-card:not(.top-story):nth-child(3n+2) {
      /* first body column (after top-story which is child 1) */
    }
    /* remove right border on every 3rd body column */
    .news-grid .news-card:not(.top-story):nth-child(3n+1) {
      border-right:none; padding-right:0;
    }

    .card-meta {
      display:flex; align-items:baseline; justify-content:space-between; gap:8px;
    }
    .card-source {
      font-family:'DM Mono',monospace;
      font-size:8px; font-weight:500; letter-spacing:.3em; text-transform:uppercase;
      color:var(--red);
    }
    .card-date {
      font-family:'DM Mono',monospace;
      font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);
      text-align:right;
    }
    .card-headline {
      font-family:'Playfair Display',serif;
      font-size:22px; font-weight:700; line-height:1.18; letter-spacing:-.005em;
      color:#000;
    }
    .card-desc {
      font-family:'Inter',sans-serif;
      font-size:13px; color:var(--muted); line-height:1.55;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .card-link {
      margin-top:auto; display:inline-flex; align-items:center; gap:5px;
      font-family:'DM Mono',monospace;
      font-size:10px; font-weight:500; letter-spacing:.16em; text-transform:uppercase;
      color:var(--red); text-decoration:none;
      padding-top:4px;
    }
    .card-link:hover { text-decoration:underline; }
    .card-link-arrow { transition:transform .2s; }
    .card-link:hover .card-link-arrow { transform:translateX(3px); }

    /* ── SKELETON ── */
    .skeleton-top {
      grid-column:1 / -1;
      padding:8px 0 36px;
      border-bottom:1px solid var(--rule);
    }
    .skeleton-card {
      background:var(--bg);
      padding:26px 26px 26px 0;
      display:flex; flex-direction:column; gap:12px;
      border-bottom:1px solid var(--line);
    }
    .news-grid .skeleton-card {
      border-right:1px solid var(--line);
      padding-left:26px;
    }
    .news-grid .skeleton-card.skel-col-last {
      border-right:none; padding-right:0;
    }
    .skel {
      background:linear-gradient(90deg,#efefef 25%,#f7f7f7 50%,#efefef 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s linear infinite;
    }
    .skel-tag  { width:60px; height:9px; }
    .skel-h1   { width:100%; height:18px; margin-top:6px; }
    .skel-h2   { width:70%; height:18px; }
    .skel-p1   { width:100%; height:10px; margin-top:8px; }
    .skel-p2   { width:90%; height:10px; }
    .skel-link { width:80px; height:9px; margin-top:8px; }
    /* top-story skeleton shapes */
    .skel-top-tag  { width:90px; height:10px; }
    .skel-top-h1   { width:60%; height:42px; margin-top:14px; }
    .skel-top-h2   { width:42%; height:42px; margin-top:8px; }
    .skel-cols {
      display:grid; grid-template-columns:repeat(3,1fr); gap:36px; margin-top:22px;
    }
    .skel-cols .skel { height:10px; margin-bottom:9px; }
    .skel-cols .skel:nth-child(4n) { width:80%; }
    @keyframes shimmer {
      0%{ background-position:200% 0 } 100%{ background-position:-200% 0 }
    }

    /* ── EMPTY / ERROR STATE ── */
    .feed-msg {
      grid-column:1/-1; padding:80px 20px;
      text-align:center;
      font-family:'DM Mono',monospace;
      font-size:9px; letter-spacing:.26em;
      text-transform:uppercase; color:var(--faint);
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      margin-top:32px; padding-top:14px;
      border-top:1px solid var(--line);
      font-family:'DM Mono',monospace;
      font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint);
    }
    .status-bar .sep { color:var(--line); }
    .status-count { color:var(--faint); }
    .status-err { color:var(--red); }

    /* ── FOOTER ── */
    footer {
      border-top:1px solid var(--ink); padding:20px 0 36px;
      display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
      font-family:'DM Mono',monospace;
      font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .shell{ width:calc(100% - 32px); }
      .masthead-title{ font-size:38px; }
      .top-story .card-headline{ font-size:34px; }
      .top-story .card-desc{ column-count:2; column-gap:28px; }
      .news-grid{ grid-template-columns:repeat(2,1fr); }
      .news-grid .news-card:not(.top-story):nth-child(3n+1){ border-right:1px solid var(--line); padding-right:26px; }
      .news-grid .news-card:not(.top-story):nth-child(2n){ border-right:none; padding-right:0; }
      .news-grid .skeleton-card.skel-col-last{ border-right:1px solid var(--line); padding-right:26px; }
    }
    @media(max-width:560px){
      .masthead-title{ font-size:30px; }
      .top-story .card-headline{ font-size:28px; }
      .top-story .card-desc{ column-count:1; }
      .news-grid{ grid-template-columns:1fr; }
      .news-grid .news-card:not(.top-story){ border-right:none; padding-right:0; }
      .nav-links{ display:none; }
      .skel-cols{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="brand" href="/">FOODOVERKILL</a>

    <nav class="nav-links">
      <a class="nav-link" href="/">Scanner</a>
      <a class="nav-link active" href="/news">News</a>
      <a class="nav-link" href="/tips">Tips</a>
    </nav>

    <div class="header-right">
      <div class="pulse-dot"></div>
      <span class="live-label">Live feed</span>
      <span id="feed-timestamp" style="color:var(--faint)">—</span>
    </div>
  </div>
</header>

<main class="shell">

  <div class="masthead-title">Contamination Dispatch</div>
  <div class="masthead-rule"></div>
  <div class="masthead-row">
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn all active" data-src="all">All</button>
      <button class="filter-btn" data-src="WHO">WHO</button>
      <button class="filter-btn" data-src="FDA">FDA</button>
      <button class="filter-btn" data-src="EWG">EWG</button>
      <button class="filter-btn" data-src="RESEARCH">Research</button>
    </div>
    <div class="masthead-date" id="masthead-date">—</div>
  </div>

  <div class="news-grid" id="news-grid">
    <!-- skeleton: top story -->
    <div class="skeleton-top">
      <div class="skel skel-top-tag"></div>
      <div class="skel skel-top-h1"></div>
      <div class="skel skel-top-h2"></div>
      <div class="skel-cols">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
      </div>
    </div>
    <!-- skeleton column cards -->
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card skel-col-last"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card skel-col-last"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
  </div>

  <div class="status-bar" id="status-bar">
    <span class="status-count" id="status-count">Loading…</span>
  </div>

</main>

<footer class="shell">
  <span>FoodOverkill / Food safety intelligence</span>
  <span>WHO · FDA · EWG · Nature Medicine</span>
</footer>

<script>
// ── static fallback cards ─────────────────────────────────────────────────────
const FALLBACK_CARDS = [
  {
    source: 'RESEARCH',
    title: 'Microplastics detected in human arterial plaque linked to cardiovascular events',
    date: 'Mar 2024',
    desc: 'A Nature Medicine study (Campen et al., 2024) found microplastic and nanoplastic particles in carotid-artery plaque. Patients with detectable particles faced a 4.5× higher risk of heart attack, stroke, or death over 34 months.',
    url: 'https://www.nature.com/articles/s41591-024-02860-4',
  },
  {
    source: 'EWG',
    title: 'EWG 2024 Dirty Dozen: strawberries, spinach top pesticide rankings for 18th year',
    date: 'Mar 2024',
    desc: 'EWG\'s annual Shopper\'s Guide found that nearly 95% of non-organic strawberry samples tested by USDA contained detectable pesticide residues, with up to 22 different chemicals on a single sample.',
    url: 'https://www.ewg.org/foodnews/dirty-dozen.php',
  },
  {
    source: 'FDA',
    title: 'FDA expands recall of deli meats following multistate Listeria outbreak',
    date: 'Jun 2024',
    desc: 'The FDA and CDC issued an expanded recall notice for ready-to-eat deli meats from multiple processors after a Listeria monocytogenes outbreak linked to 10 hospitalizations across 9 states.',
    url: 'https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts',
  },
  {
    source: 'WHO',
    title: 'WHO issues guidance on PFAS in drinking water and food packaging',
    date: 'Apr 2024',
    desc: 'The World Health Organization released updated guidelines on per- and polyfluoroalkyl substances (PFAS), noting accumulation via food packaging, cookware coatings, and contaminated produce irrigation as primary dietary exposure routes.',
    url: 'https://www.who.int/news/item/12-04-2024-who-pfas-guidance',
  },
  {
    source: 'RESEARCH',
    title: 'Nanoplastics from bottled water estimated at 100,000+ particles per liter',
    date: 'Jan 2024',
    desc: 'Columbia University researchers using stimulated Raman scattering microscopy found an average of 240,000 nanoplastic fragments per liter in bottled water — far exceeding previous microplastic counts by two to three orders of magnitude.',
    url: 'https://www.pnas.org/doi/10.1073/pnas.2300582121',
  },
  {
    source: 'EWG',
    title: 'Atrazine detected in tap water supplies serving 30 million Americans',
    date: 'Feb 2024',
    desc: 'An EWG analysis of EPA monitoring data found the herbicide atrazine — a known endocrine disruptor banned in the EU — in tap water supplies from agricultural Midwest states, with peak springtime spikes exceeding health guidelines.',
    url: 'https://www.ewg.org/tapwater/atrazine',
  },
];

// ── RSS sources ───────────────────────────────────────────────────────────────
const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
const FEEDS = [
  {
    label: 'WHO',
    url: 'https://www.who.int/feeds/entity/mediacentre/news/en/rss.xml',
  },
  {
    label: 'FDA',
    url: 'https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/food-safety-recalls/rss.xml',
  },
  {
    label: 'EWG',
    url: 'https://www.ewg.org/feed',
  },
];

// ── state ─────────────────────────────────────────────────────────────────────
let allCards = [];
let activeFilter = 'all';
let failedSources = [];

// ── helpers ───────────────────────────────────────────────────────────────────
function fmtDate(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d)) return String(raw).slice(0, 16);
  return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ').trim();
}

function truncate(str, len) {
  if (!str) return '';
  str = stripHtml(str);
  return str.length > len ? str.slice(0, len).trimEnd() + '…' : str;
}

// ── render ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('news-grid');
  const filtered = activeFilter === 'all'
    ? allCards
    : allCards.filter(c => c.source === activeFilter);

  if (!filtered.length) {
    grid.innerHTML = '<div class="feed-msg">No articles in this category</div>';
    return;
  }

  const [top, ...rest] = filtered;

  const topHtml = `
    <article class="news-card top-story">
      <div class="card-meta">
        <span class="card-source">${top.source}</span>
        <span class="card-date">${top.date}</span>
      </div>
      <div class="card-headline">${top.title}</div>
      <div class="card-desc">${top.desc}</div>
      <a class="card-link" href="${top.url}" target="_blank" rel="noopener noreferrer">
        Read dispatch <span class="card-link-arrow">→</span>
      </a>
    </article>`;

  const restHtml = rest.map((card, i) => `
    <article class="news-card" style="animation-delay:${i * 40}ms">
      <div class="card-meta">
        <span class="card-source">${card.source}</span>
        <span class="card-date">${card.date}</span>
      </div>
      <div class="card-headline">${card.title}</div>
      <div class="card-desc">${card.desc}</div>
      <a class="card-link" href="${card.url}" target="_blank" rel="noopener noreferrer">
        Read <span class="card-link-arrow">→</span>
      </a>
    </article>
  `).join('');

  grid.innerHTML = topHtml + restHtml;
}

function updateStatus() {
  const countEl = document.getElementById('status-count');
  const bar = document.getElementById('status-bar');
  const filtered = activeFilter === 'all' ? allCards : allCards.filter(c => c.source === activeFilter);
  let html = `<span class="status-count">${filtered.length} article${filtered.length !== 1 ? 's' : ''} indexed</span>`;
  html += `<span class="sep">·</span><span class="status-count">Sources: WHO FDA EWG Research</span>`;
  html += `<span class="sep">·</span><span class="status-count">Updates every 10 min</span>`;
  if (failedSources.length) {
    failedSources.forEach(src => {
      html += `<span class="sep">·</span><span class="status-err">${src} unavailable</span>`;
    });
  }
  bar.innerHTML = html;
}

function updateTimestamp() {
  const el = document.getElementById('feed-timestamp');
  const now = new Date();
  el.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const dateEl = document.getElementById('masthead-date');
  if (dateEl) {
    dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
}

// ── filter buttons ────────────────────────────────────────────────────────────
document.getElementById('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.src;
  renderGrid();
  updateStatus();
});

// ── fetch a single RSS feed ───────────────────────────────────────────────────
async function fetchFeed(feed) {
  const proxyUrl = PROXY + encodeURIComponent(feed.url);
  const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status !== 'ok' || !Array.isArray(json.items)) throw new Error('Bad response');

  return json.items.slice(0, 8).map(item => ({
    source: feed.label,
    title:  item.title || 'Untitled',
    date:   fmtDate(item.pubDate),
    desc:   truncate(item.description || item.content || '', 220),
    url:    item.link || '#',
  }));
}

// ── fallback cards for a source ───────────────────────────────────────────────
function fallbackFor(label) {
  return FALLBACK_CARDS.filter(c => c.source === label);
}

// ── main load ─────────────────────────────────────────────────────────────────
async function loadFeeds() {
  updateTimestamp();

  const results = await Promise.allSettled(FEEDS.map(f => fetchFeed(f)));

  allCards = [];
  failedSources = [];

  results.forEach((result, i) => {
    const feed = FEEDS[i];
    if (result.status === 'fulfilled' && result.value.length) {
      allCards.push(...result.value);
    } else {
      failedSources.push(feed.label);
      const fb = fallbackFor(feed.label);
      if (fb.length) allCards.push(...fb);
    }
  });

  // append research fallbacks (always shown; no live RSS for PubMed)
  const researchCards = FALLBACK_CARDS.filter(c => c.source === 'RESEARCH');
  allCards.push(...researchCards);

  // sort by position (live cards from each source are already newest-first)
  // interleave: take up to 3 from each source in round-robin so grid looks varied
  const bySource = {};
  allCards.forEach(c => {
    if (!bySource[c.source]) bySource[c.source] = [];
    bySource[c.source].push(c);
  });
  const interleaved = [];
  const keys = Object.keys(bySource);
  let more = true;
  let idx = 0;
  while (more) {
    more = false;
    keys.forEach(k => {
      if (bySource[k][idx]) {
        interleaved.push(bySource[k][idx]);
        more = true;
      }
    });
    idx++;
  }
  allCards = interleaved;

  renderGrid();
  updateStatus();
}

loadFeeds();

// auto-refresh every 10 minutes
setInterval(() => {
  loadFeeds();
}, 10 * 60 * 1000);
</script>
</body>
