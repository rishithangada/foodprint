<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodPrint — News Feed</title>
  <style>
    :root {
      --bg:#050505; --panel:#08080a; --ink:#f0f0f0; --muted:#555;
      --line:#141414; --red:#ff1a00; --yellow:#e7b923; --green:#3ecf6a;
      --red-glow: rgba(255,26,0,.18);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      background:var(--bg); color:var(--ink);
      font-family:'SF Mono',ui-monospace,Menlo,'Courier New',monospace;
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
    }

    /* ── canvas bg ── */
    #bg-canvas { position:fixed; inset:0; z-index:0; opacity:.45; pointer-events:none; }

    .shell { position:relative; z-index:1; width:min(1160px,calc(100% - 48px)); margin:0 auto; }

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:10; height:64px;
      display:flex; align-items:center; border-bottom:1px solid #ff1a0033;
      background:rgba(5,5,5,.92); backdrop-filter:blur(12px);
    }
    .header-inner {
      display:flex; align-items:center;
      width:100%; max-width:none; padding:0 24px;
    }
    .brand {
      font-size:13px; font-weight:700; letter-spacing:.38em;
      color:#fff; position:relative; text-decoration:none;
    }
    .brand::after {
      content:''; position:absolute; bottom:-2px; left:0; width:100%; height:1px;
      background:var(--red); transform:scaleX(0); transform-origin:left;
      transition:transform .4s ease; animation:brand-line 2s ease .8s forwards;
    }
    @keyframes brand-line { to { transform:scaleX(1); } }

    .nav-links {
      display:flex; align-items:center; gap:0; margin-left:32px;
    }
    .nav-link {
      font-size:8px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      color:#333; text-decoration:none; padding:6px 14px;
      border:1px solid transparent;
      transition:color .2s, border-color .2s, background .2s;
    }
    .nav-link:hover { color:#888; }
    .nav-link.active {
      color:var(--red); border-color:#ff1a0033;
      background:rgba(255,26,0,.04);
    }

    .header-right {
      margin-left:auto; display:flex; align-items:center; gap:16px;
      font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:#3a3a3a;
    }
    .pulse-dot {
      width:6px; height:6px; border-radius:50%; background:var(--red);
      box-shadow:0 0 8px var(--red); animation:blink 1.6s infinite;
    }
    .live-label { color:var(--red); font-size:8px; letter-spacing:.28em; font-weight:700; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── PAGE BODY ── */
    main.shell { padding:52px 0 80px; }

    .section-kicker {
      display:flex; align-items:center; gap:16px; margin-bottom:32px;
      font-size:9px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; color:#2e2e2e;
    }
    .section-kicker::before { content:''; width:28px; height:1px; background:var(--red); flex-shrink:0; }

    /* ── SOURCE FILTER BAR ── */
    .filter-bar {
      display:flex; align-items:center; gap:8px; margin-bottom:40px;
      flex-wrap:wrap;
    }
    .filter-btn {
      font-size:7px; font-weight:800; letter-spacing:.28em; text-transform:uppercase;
      padding:6px 16px; border:1px solid #1a1a1a; background:transparent;
      color:#333; cursor:pointer; font-family:inherit;
      transition:color .2s, border-color .2s, background .2s, box-shadow .2s;
    }
    .filter-btn:hover { color:#777; border-color:#333; }
    .filter-btn.active {
      color:var(--red); border-color:#ff1a0055;
      background:rgba(255,26,0,.05);
      box-shadow:0 0 12px rgba(255,26,0,.08);
    }
    .filter-btn.all.active { color:#fff; border-color:#333; background:rgba(255,255,255,.04); box-shadow:none; }

    /* ── STATUS BAR ── */
    .status-bar {
      display:flex; align-items:center; gap:20px; margin-bottom:28px;
      font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:#252525;
    }
    .status-bar .sep { color:#1a1a1a; }
    .status-count { color:#2e2e2e; }
    .status-err { color:#ff1a0066; }

    /* ── GRID ── */
    .news-grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:1px;
      background:#0d0d0d;
    }

    /* ── CARD ── */
    .news-card {
      background:var(--panel);
      padding:28px 26px 24px;
      display:flex; flex-direction:column; gap:14px;
      position:relative; overflow:hidden;
      transition:background .18s;
      animation:fadeIn .4s ease both;
    }
    .news-card::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      border:1px solid transparent;
      transition:border-color .2s, box-shadow .2s;
    }
    .news-card:hover { background:#0b0b0d; }
    .news-card:hover::before {
      border-color:#ff1a0022;
      box-shadow:inset 0 0 28px rgba(255,26,0,.03);
    }

    /* card top row: source + date */
    .card-meta {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
    }
    .card-source {
      font-size:7px; font-weight:800; letter-spacing:.32em; text-transform:uppercase;
      color:var(--red); padding:3px 9px; border:1px solid #ff1a0033;
      background:rgba(255,26,0,.05); flex-shrink:0;
    }
    .card-date {
      font-size:8px; letter-spacing:.1em; color:#252525;
      text-align:right; line-height:1.3;
    }

    /* headline */
    .card-headline {
      font-size:15px; font-weight:700; color:#e8e8e8; line-height:1.45;
      letter-spacing:-.01em;
    }

    /* description */
    .card-desc {
      font-size:11px; color:#3a3a3a; line-height:1.7;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden;
    }

    /* read more */
    .card-link {
      margin-top:auto; display:inline-flex; align-items:center; gap:6px;
      font-size:8px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      color:#333; text-decoration:none;
      transition:color .2s;
    }
    .card-link:hover { color:var(--red); }
    .card-link-arrow { transition:transform .2s; }
    .card-link:hover .card-link-arrow { transform:translateX(3px); }

    /* ── SKELETON ── */
    .skeleton-card {
      background:var(--panel);
      padding:28px 26px 24px;
      display:flex; flex-direction:column; gap:14px;
    }
    .skel {
      background:#0f0f0f;
      border-radius:0;
      animation:skel-pulse 1.8s ease infinite;
    }
    .skel-tag  { width:52px; height:16px; }
    .skel-h1   { width:100%; height:14px; margin-top:4px; }
    .skel-h2   { width:75%; height:14px; }
    .skel-p1   { width:100%; height:10px; margin-top:6px; }
    .skel-p2   { width:88%; height:10px; }
    .skel-link { width:80px; height:10px; margin-top:10px; }
    @keyframes skel-pulse {
      0%,100%{ opacity:.35 } 50%{ opacity:.08 }
    }

    /* ── EMPTY / ERROR STATE ── */
    .feed-msg {
      grid-column:1/-1; padding:80px 20px;
      text-align:center; font-size:8px; letter-spacing:.26em;
      text-transform:uppercase; color:#1e1e1e;
    }

    /* ── FOOTER ── */
    footer {
      border-top:1px solid #0e0e0e; padding:22px 0 32px;
      display:flex; justify-content:space-between;
      font-size:7px; letter-spacing:.2em; text-transform:uppercase; color:#1c1c1c;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .shell{ width:calc(100% - 24px); }
      .news-grid{ grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:560px){
      .news-grid{ grid-template-columns:1fr; }
      .nav-links{ display:none; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="header-inner">
    <a class="brand" href="/">FOODPRINT</a>

    <nav class="nav-links">
      <a class="nav-link" href="/">Scanner</a>
      <a class="nav-link active" href="/news">News</a>
      <a class="nav-link" href="/tips">Tips</a>
    </nav>

    <div class="header-right">
      <div class="pulse-dot"></div>
      <span class="live-label">Live feed</span>
      <span id="feed-timestamp" style="color:#222">—</span>
    </div>
  </div>
</header>

<main class="shell">

  <div class="section-kicker">Food safety intelligence</div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn all active" data-src="all">All sources</button>
    <button class="filter-btn" data-src="WHO">WHO</button>
    <button class="filter-btn" data-src="FDA">FDA</button>
    <button class="filter-btn" data-src="EWG">EWG</button>
    <button class="filter-btn" data-src="RESEARCH">Research</button>
  </div>

  <div class="status-bar" id="status-bar">
    <span class="status-count" id="status-count">Loading…</span>
  </div>

  <div class="news-grid" id="news-grid">
    <!-- skeleton cards -->
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
    <div class="skeleton-card"><div class="skel skel-tag"></div><div class="skel skel-h1"></div><div class="skel skel-h2"></div><div class="skel skel-p1"></div><div class="skel skel-p2"></div><div class="skel skel-link"></div></div>
  </div>

</main>

<footer class="shell">
  <span>FoodPrint / Food safety intelligence</span>
  <span>WHO · FDA · EWG · Nature Medicine</span>
</footer>

<script>
// ── animated grid background ──────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const gap = 64;
    const pulse = 0.5 + 0.5 * Math.sin(t * 0.008);

    // grid lines
    ctx.strokeStyle = `rgba(255,26,0,${0.022 + 0.012 * pulse})`;
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += gap) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gap) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // horizontal scan line
    const scanY = ((t * 0.4) % (H + 60)) - 30;
    const grad = ctx.createLinearGradient(0, scanY - 40, 0, scanY + 40);
    grad.addColorStop(0,   'rgba(255,26,0,0)');
    grad.addColorStop(0.5, `rgba(255,26,0,${0.06 + 0.04 * pulse})`);
    grad.addColorStop(1,   'rgba(255,26,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, scanY - 40, W, 80);

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── static fallback cards ─────────────────────────────────────────────────────
const FALLBACK_CARDS = [
  {
    source: 'RESEARCH',
    title: 'Microplastics detected in human arterial plaque linked to cardiovascular events',
    date: 'Mar 2024',
    desc: 'A Nature Medicine study (Campen et al., 2024) found microplastic and nanoplastic particles in carotid-artery plaque. Patients with detectable particles faced a 4.5× higher risk of heart attack, stroke, or death over 34 months.',
    url: 'https://www.nature.com/articles/s41591-024-02860-4',
  },
  {
    source: 'EWG',
    title: 'EWG 2024 Dirty Dozen: strawberries, spinach top pesticide rankings for 18th year',
    date: 'Mar 2024',
    desc: 'EWG\'s annual Shopper\'s Guide found that nearly 95% of non-organic strawberry samples tested by USDA contained detectable pesticide residues, with up to 22 different chemicals on a single sample.',
    url: 'https://www.ewg.org/foodnews/dirty-dozen.php',
  },
  {
    source: 'FDA',
    title: 'FDA expands recall of deli meats following multistate Listeria outbreak',
    date: 'Jun 2024',
    desc: 'The FDA and CDC issued an expanded recall notice for ready-to-eat deli meats from multiple processors after a Listeria monocytogenes outbreak linked to 10 hospitalizations across 9 states.',
    url: 'https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts',
  },
  {
    source: 'WHO',
    title: 'WHO issues guidance on PFAS in drinking water and food packaging',
    date: 'Apr 2024',
    desc: 'The World Health Organization released updated guidelines on per- and polyfluoroalkyl substances (PFAS), noting accumulation via food packaging, cookware coatings, and contaminated produce irrigation as primary dietary exposure routes.',
    url: 'https://www.who.int/news/item/12-04-2024-who-pfas-guidance',
  },
  {
    source: 'RESEARCH',
    title: 'Nanoplastics from bottled water estimated at 100,000+ particles per liter',
    date: 'Jan 2024',
    desc: 'Columbia University researchers using stimulated Raman scattering microscopy found an average of 240,000 nanoplastic fragments per liter in bottled water — far exceeding previous microplastic counts by two to three orders of magnitude.',
    url: 'https://www.pnas.org/doi/10.1073/pnas.2300582121',
  },
  {
    source: 'EWG',
    title: 'Atrazine detected in tap water supplies serving 30 million Americans',
    date: 'Feb 2024',
    desc: 'An EWG analysis of EPA monitoring data found the herbicide atrazine — a known endocrine disruptor banned in the EU — in tap water supplies from agricultural Midwest states, with peak springtime spikes exceeding health guidelines.',
    url: 'https://www.ewg.org/tapwater/atrazine',
  },
];

// ── RSS sources ───────────────────────────────────────────────────────────────
const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
const FEEDS = [
  {
    label: 'WHO',
    url: 'https://www.who.int/feeds/entity/mediacentre/news/en/rss.xml',
  },
  {
    label: 'FDA',
    url: 'https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/food-safety-recalls/rss.xml',
  },
  {
    label: 'EWG',
    url: 'https://www.ewg.org/feed',
  },
];

// ── state ─────────────────────────────────────────────────────────────────────
let allCards = [];
let activeFilter = 'all';
let failedSources = [];

// ── helpers ───────────────────────────────────────────────────────────────────
function fmtDate(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d)) return String(raw).slice(0, 16);
  return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ').trim();
}

function truncate(str, len) {
  if (!str) return '';
  str = stripHtml(str);
  return str.length > len ? str.slice(0, len).trimEnd() + '…' : str;
}

// ── render ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('news-grid');
  const filtered = activeFilter === 'all'
    ? allCards
    : allCards.filter(c => c.source === activeFilter);

  if (!filtered.length) {
    grid.innerHTML = '<div class="feed-msg">No articles in this category</div>';
    return;
  }

  grid.innerHTML = filtered.map((card, i) => `
    <article class="news-card" style="animation-delay:${i * 40}ms">
      <div class="card-meta">
        <span class="card-source">${card.source}</span>
        <span class="card-date">${card.date}</span>
      </div>
      <div class="card-headline">${card.title}</div>
      <div class="card-desc">${card.desc}</div>
      <a class="card-link" href="${card.url}" target="_blank" rel="noopener noreferrer">
        Read more <span class="card-link-arrow">→</span>
      </a>
    </article>
  `).join('');
}

function updateStatus() {
  const countEl = document.getElementById('status-count');
  const bar = document.getElementById('status-bar');
  const filtered = activeFilter === 'all' ? allCards : allCards.filter(c => c.source === activeFilter);
  let html = `<span class="status-count">${filtered.length} article${filtered.length !== 1 ? 's' : ''}</span>`;
  if (failedSources.length) {
    html += `<span class="sep">·</span><span class="status-err">${failedSources.join(', ')} unavailable — showing curated fallback</span>`;
  }
  bar.innerHTML = html;
}

function updateTimestamp() {
  const el = document.getElementById('feed-timestamp');
  const now = new Date();
  el.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// ── filter buttons ────────────────────────────────────────────────────────────
document.getElementById('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.src;
  renderGrid();
  updateStatus();
});

// ── fetch a single RSS feed ───────────────────────────────────────────────────
async function fetchFeed(feed) {
  const proxyUrl = PROXY + encodeURIComponent(feed.url);
  const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status !== 'ok' || !Array.isArray(json.items)) throw new Error('Bad response');

  return json.items.slice(0, 8).map(item => ({
    source: feed.label,
    title:  item.title || 'Untitled',
    date:   fmtDate(item.pubDate),
    desc:   truncate(item.description || item.content || '', 220),
    url:    item.link || '#',
  }));
}

// ── fallback cards for a source ───────────────────────────────────────────────
function fallbackFor(label) {
  return FALLBACK_CARDS.filter(c => c.source === label);
}

// ── main load ─────────────────────────────────────────────────────────────────
async function loadFeeds() {
  updateTimestamp();

  const results = await Promise.allSettled(FEEDS.map(f => fetchFeed(f)));

  allCards = [];
  failedSources = [];

  results.forEach((result, i) => {
    const feed = FEEDS[i];
    if (result.status === 'fulfilled' && result.value.length) {
      allCards.push(...result.value);
    } else {
      failedSources.push(feed.label);
      const fb = fallbackFor(feed.label);
      if (fb.length) allCards.push(...fb);
    }
  });

  // append research fallbacks (always shown; no live RSS for PubMed)
  const researchCards = FALLBACK_CARDS.filter(c => c.source === 'RESEARCH');
  allCards.push(...researchCards);

  // sort by position (live cards from each source are already newest-first)
  // interleave: take up to 3 from each source in round-robin so grid looks varied
  const bySource = {};
  allCards.forEach(c => {
    if (!bySource[c.source]) bySource[c.source] = [];
    bySource[c.source].push(c);
  });
  const interleaved = [];
  const keys = Object.keys(bySource);
  let more = true;
  let idx = 0;
  while (more) {
    more = false;
    keys.forEach(k => {
      if (bySource[k][idx]) {
        interleaved.push(bySource[k][idx]);
        more = true;
      }
    });
    idx++;
  }
  allCards = interleaved;

  renderGrid();
  updateStatus();
}

loadFeeds();

// auto-refresh every 10 minutes
setInterval(() => {
  loadFeeds();
}, 10 * 60 * 1000);
</script>
</body>
</html>
